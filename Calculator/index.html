<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <section id="calculator">
        <section id="history-part">
            <h1>History :</h1>
            <p id="myHistory"></p>
        </section>
        <section id="calculate-part">
        <h1 id="myText">calculator :</h1>
        <label >The First Number :</label>
        <input type="number" id="input1" min="0">
        <label >The operator :</label>
        <select name="operator" id="input2">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <option value="%">%</option>
        </select>
        <label >The Second Number :</label>
        <input type="number" id="input3" min="0">
        <button type="button" id="mySubmit">submit</button>
        <button type="button" id="myClear">clear</button>
        <p id="result"></p>
        </section>
    </section>
    <script  src="index.js"></script>
</body>
</html>
