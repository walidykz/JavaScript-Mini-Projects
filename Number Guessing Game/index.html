<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="container">
        <h1 id="gameName">Number Guessing Game</h1>
        <p id="difficulty">Difficulty</p>
        <div id="diff_lvl">
            <input type="radio" id="easy" name="difficulty">
            <label for="easy" id="easyW">Easy</label>
            <input type="radio" id="medium" name="difficulty">
            <label for="medium" id="mediumW">Medium</label>
            <input type="radio" id="hard" name="difficulty">
            <label for="hard" id="hardW">Hard</label>
        </div>
        <button id="myConfirm">confirm</button>
        <p id="description">Guess a Number between 1 and 100:</p>
        <input type="number" id="myGuess" min="1">
        <button type="button" id="myCheck">Check</button>
        <p id="myResult"></p>
        <p id="myAttempts"></p>
        <button type="button" id="myRestart">Restart</button>    
    </section>
    <script src="index.js"></script>
</body>
</html>
